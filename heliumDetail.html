<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detail Page</title>
    <link rel="stylesheet" href="./assests/css/dprgDetail.css" />
    <link rel="stylesheet" href="./assests/css/navigation.css" />
    <link rel="stylesheet" href="./assests/css/footer.css" />
    <link
      rel="stylesheet"
      href="./OwlCarousel2-master/OwlCarousel2-master/dist/assets/owl.carousel.min.css"
    />
    <link
      rel="stylesheet"
      href="./OwlCarousel2-master/OwlCarousel2-master/dist/assets/owl.theme.default.min.css"
    />

    <link
      rel="stylesheet"
      href="./bootstrap-5.3.3-dist/css/bootstrap.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  </head>
  <style>
    @media (max-width: 1024px) {
      .d-mobile {
        display: block !important;
      }
      .d-desktop {
        display: none !important;
      }
    }

    @media (min-width: 1024px) {
      .d-mobile {
        display: none !important;
      }
      .d-desktop {
        display: block !important;
      }
    }

    /* Seamless Webpage-style PDF Viewer */
    .pdf-viewer-container {
        width: 100%;
        min-height: 60vh;
        padding: 0; /* No side padding for full web feel */
        margin-bottom: 50px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0; /* ABSOLUTELY NO GAP between pages */
        background: white;
    }
    
    .pdf-page-canvas {
        max-width: 100%;
        height: auto !important;
        box-shadow: none !important; /* Remove shadows */
        border-radius: 0 !important; /* Remove rounded corners */
        background: white;
        margin: 0 !important;
        padding: 0 !important;
        display: block; /* Ensure no extra space below canvas */
    }

    .pdf-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 100px 0;
        width: 100%;
        background: #fdfdfd;
    }

    @media (max-width: 768px) {
        .pdf-viewer-container {
            padding: 0;
        }
    }
  </style>
  <body>
    <nav>
      <div class="d-desktop d-none d-md-block">
        <div class="navigationBox scrolled" id="navBarBox"></div>
      </div>

      <!-- nav mobile -->
      <div class="d-mobile d-block d-md-none" id="navBarMobile"></div>
    </nav>

    <!-- hero -->
    <div class="hero" id="hero">
      <img src="./assests/img/Frame134.png" alt="" />
    </div>

    <!-- back button and item code -->
    <div class="back-btn-container" style="flex-direction: row; justify-content: space-between; align-items: center; width: 90%; margin-left: auto; margin-right: auto; gap: 20px; flex-wrap: wrap;">
      <button class="back-btn" onclick="window.history.back()">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Back
      </button>
      <div id="item-code-header"></div>
      <div id="download-header-container"></div>
    </div>

    <!-- PDF Viewer Section -->
    <div class="pdf-viewer-container" id="pdfViewer">
        <!-- PDF will be injected here -->
        <div style="display: flex; align-items: center; justify-content: center; height: 100%;">
            <div class="spinner-border text-success" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>

    <footer>
      <div id="foot"></div>
    </footer>

    <script src="./assests/js/footer.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="./assests/js/heliumLeakDetectorsData.js"></script>
    <script src="./assests/js/navigation.js"></script>
    <script src="./assests/js/mobNavigation.js"></script>
    <script
      src="bootstrap-5.3.3-dist/js/bootstrap.bundle.min.js"
      defer
    ></script>
    <script src="./OwlCarousel2-master/OwlCarousel2-master/dist/owl.carousel.min.js"></script>
    <script src="./assests/js/heliumDetail.js" defer></script>
  </body>
</html>
