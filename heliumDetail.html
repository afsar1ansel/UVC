<style>
  .pdf-page-wrapper {
    position: relative;
    width: 100%;
    overflow: hidden;
    margin: 0 auto;
    background: white;
  }

  .textLayer {
    position: absolute;
    left: 0;
    top: 0;
    right: 0;
    bottom: 0;
    overflow: hidden;
    opacity: 1;
    line-height: 1;
    transform-origin: 0 0;
    z-index: 2;
  }

  .textLayer ::selection {
    background: rgba(13, 165, 116, 0.3) !important;
  }

  @media (max-width: 1024px) {
    .d-mobile {
      display: block !important;
    }

    .d-desktop {
      display: none !important;
    }
  }

  @media (min-width: 1024px) {
    .d-mobile {
      display: none !important;
    }

    .d-desktop {
      display: block !important;
    }
  }

  /* Seamless Webpage-style PDF Viewer */
  .pdf-viewer-container {
    width: 100%;
    min-height: 60vh;
    padding: 0;
    /* No side padding for full web feel */
    margin-bottom: 50px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    /* ABSOLUTELY NO GAP between pages */
    background: white;
  }

  .pdf-page-canvas {
    max-width: 100%;
    height: auto !important;
    box-shadow: none !important;
    /* Remove shadows */
    border-radius: 0 !important;
    /* Remove rounded corners */
    background: white;
    margin: 0 !important;
    /* Reset margin since we are cropping via JS */
    padding: 0 !important;
    display: block;
    /* Ensure no extra space below canvas */
    position: relative;
    z-index: 1;
  }

  .pdf-loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 100px 0;
    width: 100%;
    background: #fdfdfd;
  }

  @media (max-width: 768px) {
    .pdf-viewer-container {
      padding: 0;
    }
  }
</style>

<body>
  <nav>
    <div class="d-desktop d-none d-md-block">
      <div class="navigationBox scrolled" id="navBarBox"></div>
    </div>

    <!-- nav mobile -->
    <div class="d-mobile d-block d-md-none" id="navBarMobile"></div>
  </nav>

  <!-- hero -->
  <div class="hero" id="hero">
    <img src="./assests/img/banners/Frame343.webp" alt="Helium Leak Detectors" />
  </div>

  <!-- back button and item code -->
  <div class="back-btn-container"
    style="flex-direction: row; justify-content: space-between; align-items: center; width: 90%; margin-left: auto; margin-right: auto; gap: 20px; flex-wrap: wrap;">
    <button class="back-btn" onclick="window.history.back()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7" />
      </svg>
      Back
    </button>
    <div id="item-code-header"></div>
    <div id="download-header-container"></div>
  </div>

  <!-- PDF Viewer Section -->
  <div class="pdf-viewer-container" id="pdfViewer">
    <!-- PDF will be injected here -->
    <div style="display: flex; align-items: center; justify-content: center; height: 100%;">
      <div class="spinner-border text-success" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>
  </div>

  <!-- Structured Content Section (hidden by default) -->
  <div class="structured-container" id="structuredContainer"
    style="display: none; width: 85vw; margin: auto; padding-top: 20px;">
    <!-- Parent Description -->
    <div id="parentDescription" class="mb-4"
      style="line-height: 1.8; color: #4d5765; font-size: 16px; text-align: justify; display: none; background: #f8f9fa; padding: 25px; border-radius: 8px; border-left: 5px solid #ffc631;">
    </div>

    <!-- Model Selection Tabs will be injected here -->
    <div id="modelTabsContainer" class="mb-4 d-flex gap-2 flex-wrap"
      style="border-bottom: 2px solid #e9ecef; padding-bottom: 15px;"></div>

    <div class="product" id="producter"></div>
    <div class="product-table" id="productTable" style="margin-top: 50px;"></div>
    <div class="product-applications" id="productApplications"></div>
    <div class="end" id="end" style="margin-top: 50px; margin-bottom: 50px;"></div>
  </div>

  <footer>

  </footer>
