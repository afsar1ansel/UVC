<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supplies Details - UVC</title>
    <link rel="stylesheet" href="./assests/css/dprgDetail.css" />
    <link rel="stylesheet" href="./assests/css/navigation.css" />
    <link rel="stylesheet" href="./assests/css/footer.css" />
    <link
      rel="stylesheet"
      href="./OwlCarousel2-master/OwlCarousel2-master/dist/assets/owl.carousel.min.css"
    />
    <link
      rel="stylesheet"
      href="./OwlCarousel2-master/OwlCarousel2-master/dist/assets/owl.theme.default.min.css"
    />
    <link
      rel="stylesheet"
      href="./bootstrap-5.3.3-dist/css/bootstrap.min.css"
    />
  </head>
  <style>
    @media (max-width: 1024px) {
      .d-mobile {
        display: block !important;
      }
      .d-desktop {
        display: none !important;
      }
    }

    @media (min-width: 1024px) {
      .d-mobile {
        display: none !important;
      }
      .d-desktop {
        display: block !important;
      }
    }
    
    .construction-section {
      margin-top: 35px;
      padding: 24px;
      background: #f8f9fa;
      border-radius: 8px;
      border-left: 4px solid #0da574;
    }
    
    .construction-title {
      font-size: 18px;
      font-weight: 700;
      color: #001f3f;
      margin-bottom: 18px;
    }
    
    .construction-card {
      margin-bottom: 18px;
    }
    
    .construction-card:last-child {
      margin-bottom: 0;
    }
    
    .construction-card h5 {
      color: #0da574;
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 15px;
    }
    
    .construction-card ul {
      margin-bottom: 0;
      padding-left: 20px;
    }
    
    .construction-card li {
      font-size: 14px;
      color: #4d5765;
      margin-bottom: 5px;
      line-height: 1.6;
    }

    .applications-box {
      background: #fff;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      padding: 25px;
      margin-top: 30px;
    }

    .applications-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      list-style: none;
      padding-left: 0;
      margin-bottom: 0;
    }

    @media (max-width: 600px) {
      .applications-list {
        grid-template-columns: 1fr;
      }
    }

    .applications-list li {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      color: #4d5765;
    }

    .options-box {
      background: #fdfaf2;
      border: 1px solid #ffe8b6;
      border-radius: 8px;
      padding: 25px;
      margin-top: 30px;
    }
  </style>
  <body>
    <nav>
      <div class="d-desktop d-none d-md-block">
        <div class="navigationBox scrolled" id="navBarBox"></div>
      </div>
      <div class="d-mobile d-block d-md-none" id="navBarMobile"></div>
    </nav>

    <!-- hero -->
    <div class="hero" id="hero">
      <img src="./assests/img/Frame134.png" alt="" />
    </div>

    <!-- back button and item code -->
    <div class="back-btn-container" style="flex-direction: row; justify-content: space-between; align-items: center; width: 90%; margin-left: auto; margin-right: auto; gap: 20px; flex-wrap: wrap;">
      <button class="back-btn" onclick="window.history.back()">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Back
      </button>
      <div id="item-code-header"></div>
    </div>

    <!-- Structured Content Section -->
    <div class="structured-container" id="structuredContainer" style="width: 85vw; margin: auto; padding-top: 20px; margin-bottom: 60px;">
        <div class="product" id="producter" style="align-items: flex-start;">
            <!-- Details will be loaded here -->
        </div>
        <div class="product-table" id="productTable" style="margin-top: 50px;">
            <!-- Tech Specs will be loaded here -->
        </div>
        <div id="productApplications">
            <!-- Applications will be loaded here -->
        </div>
        <div id="productOptions">
            <!-- Options will be loaded here -->
        </div>
    </div>

    <footer>
      <div id="foot"></div>
    </footer>

    <script src="./assests/js/footer.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="./assests/js/suppliesData.js"></script>
    <script src="./assests/js/navigation.js"></script>
    <script src="./assests/js/mobNavigation.js"></script>
    <script
      src="bootstrap-5.3.3-dist/js/bootstrap.bundle.min.js"
      defer
    ></script>
    <script src="./OwlCarousel2-master/OwlCarousel2-master/dist/owl.carousel.min.js"></script>
    <script src="./assests/js/suppliesDetail.js" defer></script>
  </body>
</html>
