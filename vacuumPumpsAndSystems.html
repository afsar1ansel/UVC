<!doctype html>

    <link rel="stylesheet" href="./assests/css/allProduct.css" />
    <link rel="stylesheet" href="./assests/css/navigation.css" />
    <link rel="stylesheet" href="./assests/css/footer.css" />
    <link
      rel="stylesheet"
      href="./OwlCarousel2-master/OwlCarousel2-master/dist/assets/owl.carousel.min.css"

  <style>
    @media (max-width: 1024px) {
      .d-mobile {
        display: block !important;
      }
      .d-desktop {
        display: none !important;
      }
    }

    @media (min-width: 1024px) {
      .d-mobile {
        display: none !important;
      }
      .d-desktop {
        display: block !important;
      }
    }

    .page-title {
      font-size: 2.5rem;
      font-weight: bold;
      color: #333;
      margin-bottom: 1rem;
      text-align: center;
    }

    .page-description {
      font-size: 1.2rem;
      color: #666;
      text-align: center;
      margin-bottom: 3rem;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }

    .product-code {
      background-color: #ffc642;
      color: #333;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      font-weight: bold;
      display: inline-block;
      margin-top: 1rem;
    }

    .container {
      padding: 0 2rem;
    }

  <body>
    <nav>

      <div class="row">

    <script src="./assests/js/footer.js"></script>
    <script src="./assests/js/vacuumPumpsAndSystemsData.js"></script>

    <script src="./assests/js/mobNavigation.js"></script>
