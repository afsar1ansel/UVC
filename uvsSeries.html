<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UVS Vacuum Pumps & Systems</title>
    <link rel="stylesheet" href="./assests/css/allProduct.css" />
    <link rel="stylesheet" href="./assests/css/navigation.css" />
    <link rel="stylesheet" href="./assests/css/footer.css" />
    <link
      rel="stylesheet"
      href="./OwlCarousel2-master/OwlCarousel2-master/dist/assets/owl.carousel.min.css"
    />
    <link
      rel="stylesheet"
      href="./OwlCarousel2-master/OwlCarousel2-master/dist/assets/owl.theme.default.min.css"
    />
    <link
      rel="stylesheet"
      href="./bootstrap-5.3.3-dist/css/bootstrap.min.css"
    />
  </head>
  <style>
    @media (max-width: 1024px) {
      .d-mobile {
        display: block !important;
      }
      .d-desktop {
        display: none !important;
      }
    }

    @media (min-width: 1024px) {
      .d-mobile {
        display: none !important;
      }
      .d-desktop {
        display: block !important;
      }
    }

    .series-header {
      text-align: center;
      margin: 2rem 0;
    }

    .series-title {
      font-size: 2.5rem;
      font-weight: bold;
      color: #333;
      margin-bottom: 1rem;
    }

    .series-description {
      font-size: 1.1rem;
      color: #666;
      max-width: 800px;
      margin: 0 auto;
    }
  </style>
  <body>
    <nav>
      <div class="d-desktop d-none d-md-block">
        <div class="navigationBox scrolled" id="navBarBox"></div>
      </div>

      <div class="d-mobile d-block d-md-none" id="navBarMobile"></div>
    </nav>

    <div class="hero">
      <img src="./assests/img/Frame134.png" alt="UVS Vacuum Pumps & Systems" />
    </div>

    <div class="container">
      <div class="series-header">
        <h1 class="series-title">UVS Series</h1>
        <p class="series-description">
          Discover our comprehensive range of UVS vacuum pumps designed for
          industrial applications. Our UVS series offers reliable performance
          and efficiency for various vacuum requirements.
        </p>
      </div>

      <div class="row">
        <div class="col-12">
          <div class="product-grid" id="productGrid">
            <!-- Products will be rendered here -->
          </div>
        </div>
      </div>
    </div>

    <footer id="footer"></footer>

    <script src="./assests/js/footer.js"></script>
    <script src="./assests/js/vacuumPumpsAndSystemsData.js"></script>
    <script src="./assests/js/navigation.js"></script>
    <script src="./assests/js/mobNavigation.js"></script>
    <script src="./assests/js/uvsSeries.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="./OwlCarousel2-master/OwlCarousel2-master/dist/owl.carousel.min.js"></script>
    <script
      src="./bootstrap-5.3.3-dist/js/bootstrap.bundle.min.js"
      defer
    ></script>
  </body>
</html>
