<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UVS Vacuum Pumps & Systems</title>
    <link rel="stylesheet" href="./assests/css/productDetails.css" />
    <link rel="stylesheet" href="./assests/css/navigation.css" />
    <link rel="stylesheet" href="./assests/css/footer.css" />
    <link
      rel="stylesheet"
      href="./OwlCarousel2-master/OwlCarousel2-master/dist/assets/owl.carousel.min.css"
    />
    <link
      rel="stylesheet"
      href="./OwlCarousel2-master/OwlCarousel2-master/dist/assets/owl.theme.default.min.css"
    />
    <link
      rel="stylesheet"
      href="./bootstrap-5.3.3-dist/css/bootstrap.min.css"
    />
  </head>
  <style>
    @media (max-width: 1024px) {
      .d-mobile {
        display: block !important;
      }
      .d-desktop {
        display: none !important;
      }
    }

    @media (min-width: 1024px) {
      .d-mobile {
        display: none !important;
      }
      .d-desktop {
        display: block !important;
      }
    }

    .back-btn-container {
      width: 85vw;
      margin: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .back-btn {
      background: #0d3156;
      color: #ffffff;
      border: none;
      padding: 10px 18px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      border-radius: 4px;
    }

    .item-code-heading {
      font-size: 20px;
      font-weight: 700;
      color: #0d3156;
    }

    .product-applications {
      width: 85vw;
      margin: auto;
      margin-bottom: 40px;
      color: #4d5765;
    }

    .product-applications ul {
      margin-top: 16px;
      padding-left: 20px;
    }

    .product-applications li {
      margin-bottom: 10px;
    }
  </style>
  <body>
    <nav>
      <div class="d-desktop d-none d-md-block">
        <div class="navigationBox scrolled" id="navBarBox"></div>
      </div>

      <div class="d-mobile d-block d-md-none" id="navBarMobile"></div>
    </nav>

    <div class="hero" id="hero">
      <img src="./assests/img/Frame134.png" alt="UVS Vacuum Pumps" />
    </div>

    <div class="back-btn-container">
      <button class="back-btn" onclick="window.history.back()">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M19 12H5M12 19l-7-7 7-7" />
        </svg>
        Back
      </button>
      <div id="item-code-header"></div>
    </div>

    <div class="product" id="producter"></div>
    <div class="product-table" id="productTable"></div>
    <div class="product-applications" id="productApplications"></div>
    <div class="end" id="end"></div>

    <footer>
      <div id="foot"></div>
    </footer>

    <script src="./assests/js/footer.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="./assests/js/vacuumPumpsAndSystemsData.js"></script>
    <script src="./assests/js/navigation.js"></script>
    <script src="./assests/js/mobNavigation.js"></script>
    <script
      src="bootstrap-5.3.3-dist/js/bootstrap.bundle.min.js"
      defer
    ></script>
    <script src="./assests/js/uvsPumpDetail.js" defer></script>
  </body>
</html>
