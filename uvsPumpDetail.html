  <style>
    @media (max-width: 1024px) {
      .d-mobile {
        display: block !important;
      }
      .d-desktop {
        display: none !important;
      }
    }

    @media (min-width: 1024px) {
      .d-mobile {
        display: none !important;

    .back-btn-container {

      gap: 8px;
      font-size: 14px;
      border-radius: 4px;

      margin: auto;
      margin-bottom: 40px;

      padding-left: 20px;
    }

      margin-bottom: 10px;

      width: 85vw;

      color: #4d5765;
